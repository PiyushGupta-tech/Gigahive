<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Gigahive</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .checkout-page { padding: 32px 0 64px; max-width: 640px; margin: 0 auto; }
    .checkout-page h1 { font-size: 28px; margin-bottom: 24px; color: var(--color-gray-900); }
    .checkout-summary { border: 1px solid var(--color-border); border-radius: 8px; padding: 24px; margin-bottom: 24px; background: linear-gradient(180deg, #18181c 0%, #121214 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
    .checkout-summary .row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--color-gray-600); }
    .checkout-summary .total { font-size: 18px; font-weight: 700; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--color-border); color: var(--color-gray-900); }
    .btn-place-order { display: block; width: 100%; padding: 14px; background: var(--gloss-cta); color: #0a0a0c; text-align: center; font-weight: 600; border-radius: 6px; border: 1px solid rgba(255,255,255,0.25); font-size: 16px; cursor: pointer; font-family: inherit; box-shadow: inset 0 1px 0 rgba(255,255,255,0.45); }
    .btn-place-order:hover { background: var(--gloss-cta-hover); }
    .secure-note { text-align: center; font-size: 13px; color: var(--color-gray-500); margin-top: 16px; }
  </style>
</head>
<body>
  <div class="top-bar">
    <p>Free shipping on orders above ₹499</p>
  </div>
  <header class="header">
    <div class="header-inner container">
      <a href="index.html" class="logo">GIGAHIVE</a>
      <nav class="main-nav">
        <span class="nav-dropdown">
          <a href="t-shirts-for-men.html" class="nav-item">Topwear ▾</a>
          <div class="dropdown-menu">
            <a href="t-shirts-for-men.html">T-Shirts for Men</a>
            <a href="mens-shirts.html">Shirts for Men</a>
            <a href="polo-t-shirts.html">Polo T-Shirts</a>
            <a href="womens-clothing.html">Women's Clothing</a>
          </div>
        </span>
        <span class="nav-dropdown">
          <a href="mens-bottomwear.html" class="nav-item">Bottomwear ▾</a>
          <div class="dropdown-menu">
            <a href="mens-pants.html">Trousers for Men</a>



            <a href="mens-jeans.html">Jeans for Men</a>


          </div>
        </span>
        <a href="combo-products.html" class="nav-item">Combos</a>
        <a href="mens-new-arrival.html" class="nav-item">New Arrivals</a>

      </nav>
      <div class="header-actions">
        <span id="header-auth"></span>
        <a href="cart.html" class="cart-btn" aria-label="Cart"><span class="icon-cart-header"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span><span class="cart-count" id="cart-count">0</span></a>
      </div>
    </div>
  </header>
  <main class="container checkout-page">
    <h1>Checkout</h1>
    <div id="checkout-summary"></div>
    <p class="secure-note">100% secure payment</p>
  </main>
  <script src="js/app.js"></script>
  <script>
    (function() {
      function formatPrice(n) { return '₹' + (n || 0).toLocaleString('en-IN'); }
      var items = window.GigahiveApp.getCart();
      var wrap = document.getElementById('checkout-summary');
      if (!items.length) {
        wrap.innerHTML = '<p>Your cart is empty. <a href="index.html">Continue shopping</a>.</p>';
        return;
      }
      var total = items.reduce(function(s, i) { return s + (i.price || 0) * (i.qty || 1); }, 0);
      wrap.innerHTML = '<div class="checkout-summary">' +
        '<div class="row"><span>Items</span><span>' + items.length + '</span></div>' +
        '<div class="row total"><span>Total</span><span>' + formatPrice(total) + '</span></div>' +
        '<button type="button" class="btn-place-order" id="place-order">Place Order</button></div>';
      document.getElementById('place-order').addEventListener('click', function() {
        window.GigahiveApp.saveCart([]);
        alert('Thank you! Your order has been placed. (Demo – no payment processed.)');
        window.location.href = 'index.html';
      });
    })();
  </script>
</body>
</html>
